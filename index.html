<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="js-widget-title" content="Art Docent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://widgetweb.app/js-widget.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: transparent;
            color: white;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            gap: 2px;
            text-shadow: 0px 1px 3px rgba(0,0,0,0.9);
        }
        .days-until { color: #FF9F0A; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .date-line { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .lesson { font-weight: 800; font-size: 14px; color: #0A84FF; }
        .details { font-size: 10px; opacity: 0.8; line-height: 1.2; }
        .partners { font-size: 10px; opacity: 0.6; font-style: italic; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="content">Syncing Schedule...</div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQj04ZOaev6TJ1MTMeEphGMNps96WhCnB29JpzUGx1cr3wJjWCsGC2x5cVMDier6PXQNkZzIA_DlmmJ/pub?output=csv";

        function __wweb2WaitMillisecondsToWidgetIsReady() { return 1500; }

        // Robust CSV row parser that handles commas inside quotes
        function parseCSVRow(str) {
            const arr = [];
            let quote = false;
            let col = "";
            for (let c = 0; c < str.length; c++) {
                let char = str[c];
                if (char === '"') {
                    quote = !quote;
                } else if (char === ',' && !quote) {
                    arr.push(col.trim());
                    col = "";
                } else {
                    col += char;
                }
            }
            arr.push(col.trim());
            return arr;
        }

        async function fetchAndDisplay() {
            const container = document.getElementById('content');
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                
                const lines = text.split('\n');
                const rows = lines.map(line => parseCSVRow(line));

                const now = new Date();
                now.setHours(0,0,0,0);
                
                let nextSession = null;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 2) continue;

                    const dateStr = row[1]; // Column B
                    const sessionDate = new Date(dateStr);

                    if (!isNaN(sessionDate.getTime()) && sessionDate >= now) {
                        nextSession = {
                            date: sessionDate,
                            lesson: row[4] || "Art Lesson",       // Column E
                            teacher: row[5] || "",                // Column F
                            school: row[6] || "Covington",        // Column G
                            grade: row[7] || "",                  // Column H
                            assistants: row[9] || ""               // Column J
                        };
                        break;
                    }
                }

                if (nextSession) {
                    const diffTime = nextSession.date - now;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    const dayLabel = diffDays === 0 ? "Today" : `in ${diffDays} days`;
                    
                    const dateStr = nextSession.date.toLocaleDateString('en-US', { 
                        weekday: 'short', month: 'short', day: 'numeric' 
                    });

                    container.innerHTML = `
                        <div class="days-until">${dayLabel}</div>
                        <div class="date-line">${dateStr}</div>
                        <div class="lesson">${nextSession.lesson}</div>
                        <div class="details">${nextSession.teacher} (${nextSession.grade}th) @ ${nextSession.school}</div>
                        <div class="partners">${nextSession.assistants}</div>
                    `;
                } else {
                    container.innerHTML = `<div class="details">No upcoming lessons found.</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="details">Error syncing.</div>`;
            }
        }

        fetchAndDisplay();
    </script>
</body>
</html>
